<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="../shared/call-interface.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/notifications.js"></script>
</head>
<body>
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1 id="student-welcome">Welcome, Student</h1>
      <button id="logout-btn" class="logout-btn" type="button">Logout</button>
    </div>

    <!-- Student Profile Card -->
    <div class="student-profile-card">
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar">S</div>
        <div class="profile-info">
          <h2 id="profile-name">Loading...</h2>
          <p id="profile-id" class="profile-id">ID: --</p>
          <p id="profile-department" class="profile-department">Department: --</p>
        </div>
        <div class="profile-stats">
          <div class="stat-item">
            <span class="stat-label">Completed</span>
            <span class="stat-value" id="stat-completed">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Avg. Wait</span>
            <span class="stat-value" id="stat-avg-wait">--</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Notifications Section -->
    <div id="notifications-container" class="notifications-container"></div>

    <div class="my-queue-panel">
      <div class="queue-header-with-call">
        <h2>My Queue Today</h2>
        <button id="startCallBtn" class="call-btn" onclick="startStudentCall()" title="Start consultation call with recording">
          🎙️ Start Recording Call
        </button>
      </div>
      <p id="queue-live-banner" class="queue-live-banner" hidden></p>
      <div id="my-queue-list" class="my-queue-list">
        <p class="muted-text">Loading your queue...</p>
      </div>
    </div>

    <style>
      .queue-header-with-call {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
      .queue-header-with-call h2 {
        margin: 0;
      }
      .call-btn {
        padding: 10px 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }
      .call-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      .call-btn:active {
        transform: translateY(0);
      }
      @media (max-width: 768px) {
        .queue-header-with-call {
          flex-direction: column;
          gap: 10px;
          align-items: flex-start;
        }
        .call-btn {
          width: 100%;
          text-align: center;
        }
      }
    </style>

    <div class="faculty-availability">
      <div class="section-head">
        <h2>Faculty Availability</h2>
        <button id="refresh-eta-btn" class="refresh-eta-btn" type="button">Refresh ETA</button>
      </div>
      <div id="faculty-grid" class="faculty-grid"></div>
    </div>

    <p id="message-section" class="message-section"></p>
  </div>

  <!-- Call System Scripts -->
  <script src="../shared/call-manager.js"></script>
  <script src="../shared/call-interface.js"></script>
  <script src="../shared/call-signaling.js"></script>
  <script src="../shared/recording-storage.js"></script>
  <script src="../shared/consultation-call-manager.js"></script>

  <script src="dashboard.js"></script>
</body>
</html>
